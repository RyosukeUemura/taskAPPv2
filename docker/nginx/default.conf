# ── upstream 定義 ────────────────────────────────────────────────────────────
# Laravel (PHP-FPM) は FastCGI で接続するため upstream 不要
# Vite 開発サーバー（デフォルトポート 5173）
upstream vite_backend {
    server node:5173;
}

server {
    listen 80;
    server_name localhost;

    # Laravel の公開ディレクトリをドキュメントルートに設定
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 100M;

    # ── [1] Vite HMR 用 WebSocket ─────────────────────────────────────────────
    # Vite は HMR 通知に /@vite/client を経由した WebSocket を使用する。
    # HTTP の Upgrade ヘッダーを透過させることで ws:// 接続を成立させる。
    location /@vite/ {
        proxy_pass         http://vite_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;   # WebSocket ハンドシェイク
        proxy_set_header   Connection "upgrade";       # keep-alive → ws にアップグレード
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── [2] Laravel API (/api/*) → PHP-FPM (FastCGI) ─────────────────────────
    location /api/ {
        # URIに .php が含まれなくてもすべて index.php に集約（Laravel のフロントコントローラー）
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── [3] PHP-FPM 実行（/api/ の try_files から内部リダイレクトされる） ─────
    location ~ \.php$ {
        try_files        $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass    php:9000;
        fastcgi_index   index.php;
        include         fastcgi_params;
        fastcgi_param   SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        fastcgi_param   PATH_INFO        $fastcgi_path_info;
        fastcgi_param   DOCUMENT_ROOT    $realpath_root;
    }

    # ── [4] それ以外すべて → Vite 開発サーバー ───────────────────────────────
    # React のルーティング（react-router-dom など）は Vite 側が担うため、
    # Nginx は URL をそのまま Vite に流すだけでよい。
    location / {
        proxy_pass         http://vite_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;   # WS アップグレードに対応
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── ヘルスチェック ───────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── セキュリティ: 隠しファイルへのアクセス拒否 ──────────────────────────
    # Vite の内部キャッシュ（.vite/deps/）は例外として通す
    location ~ /\.vite/ {
        proxy_pass         http://vite_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # それ以外のドットファイル・ドットディレクトリはすべて拒否
    location ~ /\. {
        deny all;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
