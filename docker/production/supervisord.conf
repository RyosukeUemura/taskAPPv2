; ── supervisord 設定 ────────────────────────────────────────────────────────
;
; supervisord とは：複数のプロセスを1つの親プロセスとして管理するツール。
;
; Cloud Run は「1コンテナ = 1プロセス」を想定しているが、
; このアプリは nginx と php-fpm の2プロセスが必要。
; supervisord がその2つを子プロセスとして起動・監視し、
; どちらかがクラッシュしたら自動再起動してくれる。
;
; 構造：
;   supervisord（親）
;   ├── nginx（子プロセス1）
;   └── php-fpm（子プロセス2）
; ────────────────────────────────────────────────────────────────────────────

[supervisord]
nodaemon=true                  ; フォアグラウンドで実行（コンテナに必須）
logfile=/dev/stdout            ; ログをstdoutへ（Cloud Loggingで収集される）
logfile_maxbytes=0
loglevel=info
pidfile=/var/run/supervisord.pid

; ── PHP-FPM ─────────────────────────────────────────────────────────────────
[program:php-fpm]
command=php-fpm -F             ; -F: フォアグラウンドで起動
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10                    ; php-fpm を先に起動（nginx より先）

; ── Nginx ────────────────────────────────────────────────────────────────────
; Cold Start Race Condition 対策:
;   supervisord は priority 順に spawn するが「前のプロセスが ready になるまで待つ」
;   機能はない。php-fpm (port 9000) が未準備のまま nginx が 8080 を開くと、
;   最初のリクエストで 502 Bad Gateway になる。
;   → nginx の command を bash ラッパーにして、port 9000 が開くまでループ待機し、
;     準備完了後に exec nginx する。これで php-fpm が必ず先に ready になる。
[program:nginx]
command=/bin/bash -c "until bash -c 'echo > /dev/tcp/127.0.0.1/9000' 2>/dev/null; do sleep 0.1; done && exec nginx -g 'daemon off;'"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20                    ; php-fpm の後に起動（かつポート確認後に起動）
