# ── 本番用 Nginx 設定 ─────────────────────────────────────────────────────────
#
# 開発用（default.conf）との主な違い：
#   - Viteサーバーへのプロキシは不要（ビルド済み静的ファイルを直接配信）
#   - HMR（ホットリロード）WebSocketは不要
#   - listen ポートは環境変数 ${PORT} で受ける（Cloud Run 必須）
#     → start.sh の envsubst がデプロイ時に実際のポート番号（8080）に置換する
#
# ファイル内の ${PORT} は nginx の変数ではなくシェル変数のプレースホルダー。
# 他の $uri, $query_string 等は nginx 変数なので envsubst では触らない。
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # Cloud Run のロードバランサーが X-Forwarded-For を付与する
    real_ip_header    X-Forwarded-For;
    set_real_ip_from  0.0.0.0/0;

    server {
        listen ${PORT};
        server_name _;

        # Laravel の public/ をドキュメントルートに設定
        # Vite の dist/ はここへコピーされている（Dockerfile.prod で）
        root  /var/www/html/public;
        index index.html index.php;

        charset     utf-8;
        client_max_body_size 100M;

        # ── [1] ヘルスチェック ────────────────────────────────────────────────
        # Cloud Run / ロードバランサーが死活監視に使うエンドポイント
        location /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── [2] Laravel API・Sanctum（Cookie認証）→ PHP-FPM ─────────────────
        location ~ ^/(api|sanctum)/ {
            # Laravel のフロントコントローラー（index.php）に集約
            try_files $uri /index.php?$query_string;
        }

        # ── [3] PHP-FPM 実行（[2] の try_files から内部リダイレクトされる） ─
        # `location = /index.php` は完全一致のみ。
        # ユーザーが /index.php を直接リクエストしてもここには来ない点がポイント。
        location = /index.php {
            fastcgi_pass            127.0.0.1:9000;
            fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_read_timeout    60;
            include                 fastcgi_params;
        }

        # ── [4] React SPA（全リクエストをここでキャッチ） ─────────────────────
        # 静的ファイルが存在すればそのまま配信。
        # 存在しない URL（/tasks, /login 等）は index.html へフォールバック
        # → React Router がクライアント側でルーティングを処理する。
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── セキュリティ：隠しファイルへのアクセス拒否 ──────────────────────
        location ~ /\. {
            deny all;
        }

        # ── ログ設定 ────────────────────────────────────────────────────────
        # Cloud Run はコンテナの stdout/stderr を Cloud Logging に転送する
        error_log  /dev/stderr warn;
        access_log /dev/stdout;
    }
}
